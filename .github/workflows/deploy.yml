name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: production
      url: https://mindease.thawhakyi.com
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/laravel' }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          php artisan down --retry=60 || true

          cleanup() {
            php artisan up || true
          }
          trap cleanup EXIT

          git fetch origin "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"

          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

          npm ci
          npm run build

          php artisan migrate --force
          php artisan storage:link || true
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          if command -v php8.5-fpm >/dev/null 2>&1; then
            sudo service php8.5-fpm reload
          elif command -v php8.4-fpm >/dev/null 2>&1; then
            sudo service php8.4-fpm reload
          elif command -v php8.3-fpm >/dev/null 2>&1; then
            sudo service php8.3-fpm reload
          fi

          if command -v supervisorctl >/dev/null 2>&1; then
            sudo supervisorctl reread || true
            sudo supervisorctl update || true
            sudo supervisorctl restart laravel-worker:* || true
          fi

          php artisan up
          trap - EXIT
          EOF
